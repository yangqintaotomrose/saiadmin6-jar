# Spring配置
spring:
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  # Redis配置
  redis:
    host: localhost
    port: 6379
    # password:  # 如果有密码请填写
    database: 0
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /

# 应用配置
app:
  # 服务器基础URL，测试环境使用localhost，生产环境替换为实际域名
  base-url: http://localhost:8080

# 文件上传配置
file:
  upload:
    # 文件存储基础路径
    path: /data/imgs/
    # 允许的文件类型
    allowed-types:
      image: ["jpg", "jpeg", "png", "gif", "bmp", "webp", "svg"]
      document: ["pdf", "doc", "docx", "xls", "xlsx", "ppt", "pptx", "txt"]
      audio: ["mp3", "wav", "flac", "aac", "ogg"]
      video: ["mp4", "avi", "mov", "wmv", "flv", "mkv"]
    # 文件大小限制（字节）
    max-size:
      image: 10485760    # 10MB
      document: 52428800  # 50MB
      audio: 104857600   # 100MB
      video: 1073741824  # 1GB

# Sa-Token配置
sa-token:
  # token名称 (同时也是cookie名称)
  token-name: satoken
  # token有效期，单位s 默认30天, -1代表永不过期
  timeout: 2592000
  # token临时有效期 (指定时间内无操作就视为token过期) 单位: 秒
  active-timeout: -1
  # 是否允许同一账号并发登录 (为true时允许一起登录, 为false时新登录挤掉旧登录)
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个token (为true时所有登录共用一个token, 为false时每次登录新建一个token)
  is-share: false
  # token风格
  token-style: uuid
  # 是否输出操作日志
  is-log: false
  # jwt秘钥
  jwt-secret-key: abcdefghijklmnopqrstuvwxyz
  # 配置Sa-Token单独使用的Redis连接
  alone-redis:
    # Redis数据库索引（默认为0）
    database: 1
    # Redis服务器地址
    host: 127.0.0.1
    # Redis服务器连接端口
    port: 6379
    # Redis服务器连接密码（默认为空）
    # password:
    # 连接超时时间
    timeout: 10s




